<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Application</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

header {
    background:#0b2a4a;
    color:white;
    padding:60px 20px;
    position:relative;
}

form {
    background:white;
    max-width:500px;
    margin:40px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input, textarea {
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    background:#0b2a4a;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#123d6b;
}
nav {
    position:absolute;
    top:20px;
    right:20px;
}

.dropdown {
    position:relative;
    display:inline-block;
}

.dropdown button {
    padding:10px 15px;
    cursor:pointer;
}

.dropdown-content {
    display:none;
    position:absolute;
    right:0;
    background:white;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
}

.dropdown-content a {
    display:block;
    padding:10px;
    text-decoration:none;
    color:black;
}

.dropdown:hover .dropdown-content {
    display:block;
}

iframe {
    width:90%;
    height:700px;
    border:none;
    margin-top:30px;
}
</style>
</head>

<body>

<header>

<nav>
  <div class="dropdown">
    <button>Menu ▼</button>
    <div class="dropdown-content">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="application.html">Application</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</nav>
<h1>Apply to the AJ Is Always Right Foundation</h1>
</header>

<form onsubmit="submitForm(event)">
    <input id="name" type="text" placeholder="Full Name" required><br>
    <input id="email" type="email" placeholder="Email" required><br>
    <input id="phone" type="tel" placeholder="Phone"><br>

    <textarea id="reason" placeholder="How often are you right?" required></textarea><br>

    <button type="submit">Submit</button>
</form>

<script>
function handleSubmit(event) {
    event.preventDefault();
    window.location.href = "success.html";
}
</script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("YHyesqr5XLqunq-Q1");
})();

function submitForm(event) {
    event.preventDefault();

    const params = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        reason: document.getElementById("reason").value
    };

    emailjs.send("service_ajalwaysright", "template_z13r7nu", params)
    .then(function() {
        window.location.href = "success.html";
    }, function(error) {
        alert("Failed to send email");
        console.log(error);
    });
}
</script>
</body>
</html>
