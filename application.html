<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Application</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

header {
    background:#0b2a4a;
    color:white;
    padding:60px 20px;
    position:relative;
}

form {
    background:white;
    max-width:500px;
    margin:40px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input, textarea {
    width:90%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button {
    background:#0b2a4a;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover {
    background:#123d6b;
}
</style>

</head>

<body>

<header>
<h1>Apply to the AJ Is Always Right Foundation</h1>
</header>

<form onsubmit="handleSubmit(event)">
    <h2>Application Form</h2>

    <input type="text" placeholder="Full Name" required><br>
    <input type="email" placeholder="Email" required><br>
    <input type="tel" placeholder="Phone Number"><br>

    <textarea rows="4" placeholder="Why do you want to join?" required></textarea><br>

    <textarea rows="4" placeholder="Relevant experience (Are you ever Right?)"></textarea><br>

    <button type="submit">Submit Application</button>
</form>

<script>
function handleSubmit(event) {
    event.preventDefault();
    alert("Application submitted! (This is a demo — not saved yet)");
}
</script>

</body>
</html>
